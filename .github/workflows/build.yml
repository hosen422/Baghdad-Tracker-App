name: Enforced Stable Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Fixed Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup Java Environment (Required for Android Tools)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK & Accept Licenses
      uses: android-actions/setup-android@v3
      with:
        log-accepted-licenses: true

    - name: Install Specific Build-Tools and AIDL
      run: |
        # استدعاء الأداة بمسارها المطلق المضمون داخل السيرفر
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.1" "platforms;android-33"

    - name: Install Strict Python Packages
      run: |
        pip install --upgrade pip
        pip install "cython>=0.29.33,<3.0.0" "buildozer==1.5.0" kivy plyer

    - name: Compile With Forced Environment
      run: |
        export ANDROID_LICENSES_AUTO_ACCEPT=yes
        export GRADLE_OPTS="-Dorg.gradle.daemon=false"
        rm -rf .buildozer/
        buildozer android debug
        
    - name: Upload Finished APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AlMandoub-APK
        path: bin/*.apk
