name: Enforced Stable Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Fixed Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libc6-dev

    - name: Install Strict Python Packages
      run: |
        pip install --upgrade pip
        # قفل الإصدارات لمنع الارتجال السحابي
        pip install "cython>=0.29.33,<3.0.0" "buildozer==1.5.0" kivy plyer

    - name: Compile With Forced Environment
      run: |
        export ANDROID_LICENSES_AUTO_ACCEPT=yes
        export GRADLE_OPTS="-Dorg.gradle.daemon=false"
        # مسح شامل لأي بقايا معطوبة سابقة في السيرفر
        rm -rf .buildozer/
        buildozer android debug
        
    - name: Upload Finished APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AlMandoub-APK
        path: bin/*.apk
