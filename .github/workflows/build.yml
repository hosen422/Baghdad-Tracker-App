name: Final Clean Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libc6-dev

    - name: Install Core Tools
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer kivy plyer

    - name: Pure Compile
      run: |
        export ANDROID_LICENSES_AUTO_ACCEPT=yes
        export GRADLE_OPTS="-Dorg.gradle.daemon=false"
        yes | buildozer android debug
        
    - name: Upload Finished APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AlMandoub-APK
        path: bin/*.apk
