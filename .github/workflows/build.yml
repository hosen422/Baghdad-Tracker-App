name: Forced Handshake Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Fixed Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Setup Java Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Download and Force Install Android SDK & AIDL
      run: |
        # تحميل حزمة الأدوات الرسمية
        mkdir -p $HOME/android-cmdline
        cd $HOME/android-cmdline
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        
        # هندسة المسار الحديث
        mkdir -p $HOME/android-sdk/cmdline-tools/latest
        mv cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/
        
        export ANDROID_HOME=$HOME/android-sdk
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        
        # تحميل متطلبات البناء
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.1" "platforms;android-33" "platform-tools"

        # 🔥 الحل السحري: إنشاء المجلد القديم وربطه برابط وهمي (Symlink) لخدعة p4a
        mkdir -p $ANDROID_HOME/tools/bin
        ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager

    - name: Download and Force Install Android NDK 25b
      run: |
        cd $HOME
        wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
        unzip -q android-ndk-r25b-linux.zip
        mv android-ndk-r25b $HOME/android-ndk

    - name: Install Strict Python Packages
      run: |
        pip install --upgrade pip
        pip install "cython>=0.29.33,<3.0.0" "buildozer==1.5.0" kivy plyer

    - name: Compile With Pre-Installed SDK & NDK
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        export ANDROID_NDK_HOME=$HOME/android-ndk
        export PATH=$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin:$PATH
        export ANDROID_LICENSES_AUTO_ACCEPT=yes
        export GRADLE_OPTS="-Dorg.gradle.daemon=false"
        
        rm -rf .buildozer/
        buildozer android debug
        
    - name: Upload Finished APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AlMandoub-APK
        path: bin/*.apk
