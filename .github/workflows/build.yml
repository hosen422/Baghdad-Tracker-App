name: Enforced Stable Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Fixed Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libc6-dev

    - name: Install Strict Python Packages
      run: |
        pip install --upgrade pip
        pip install "cython>=0.29.33,<3.0.0" "buildozer==1.5.0" kivy plyer

    - name: Auto-Accept Android SDK Licenses Enforced
      run: |
        # قبول كافة الرخص الحالية والمستقبلية لـ SDK 37 وجوجل إجبارياً
        mkdir -p $ANDROID_HOME/licenses
        echo -e "\n89404225119a4350d0d3c0a94a144357e9d404d" > $ANDROID_HOME/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_HOME/licenses/android-sdk-preview-license
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Compile With Forced Environment
      run: |
        export ANDROID_LICENSES_AUTO_ACCEPT=yes
        export GRADLE_OPTS="-Dorg.gradle.daemon=false"
        # تصفير الكاش المعطوب لبدء بناء سليم بالرخص الجديدة
        rm -rf .buildozer/
        buildozer android debug
        
    - name: Upload Finished APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AlMandoub-APK
        path: bin/*.apk
