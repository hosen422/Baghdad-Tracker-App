name: Ultimate Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Fixed Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11.1'

    - name: Install Pure Core Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libc6-dev

    - name: Install Matching Build Tools
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer kivy plyer

    - name: Compile Fresh APK
      run: |
        export ANDROID_LICENSES_AUTO_ACCEPT=yes
        export GRADLE_OPTS="-Dorg.gradle.daemon=false"
        # تصفير الكاش المحلي فقط داخل المستودع لضمان قراءة الإعدادات الجديدة
        rm -rf .buildozer/
        yes | buildozer android debug
        
    - name: Extract and Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: AlMandoub-Final-APK
        path: bin/*.apk
